apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hypershift-prepare-credentials
  namespace: {{ .Values.pipelineNamespace }}
  labels:
    {{- include "pipelines.labels" . | nindent 4 }}
spec:
  description: Assembles pull secret and generates STS credentials for HyperShift cluster creation.
  params:
  - name: cluster-name
    type: string
  workspaces:
  - name: credentials
    description: Writable workspace for assembled credential files
  steps:
  - name: write-pull-secret
    image: {{ .Values.toolsImage | quote }}
    script: |
      #!/bin/bash
      set -euo pipefail
      CLUSTER_NAME="$(params.cluster-name)"
      DEST="$(workspaces.credentials.path)"
      mkdir -p "${DEST}"

      oc get secret global-pullsecret -n "${CLUSTER_NAME}" \
        -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d \
        > "${DEST}/pull-secret.json"

      echo "Pull secret written to ${DEST}/pull-secret.json"
  - name: write-aws-creds
    image: {{ .Values.toolsImage | quote }}
    script: |
      #!/bin/bash
      set -euo pipefail
      CLUSTER_NAME="$(params.cluster-name)"
      DEST="$(workspaces.credentials.path)"

      AK=$(oc get secret aws-creds -n "${CLUSTER_NAME}" -o jsonpath='{.data.aws_access_key_id}' | base64 -d)
      SK=$(oc get secret aws-creds -n "${CLUSTER_NAME}" -o jsonpath='{.data.aws_secret_access_key}' | base64 -d)

      printf '[default]\naws_access_key_id = %s\naws_secret_access_key = %s\n' "${AK}" "${SK}" \
        > "${DEST}/aws-creds"

      echo "AWS credentials file written to ${DEST}/aws-creds"
  - name: generate-sts-creds
    image: {{ .Values.awsCliImage | quote }}
    script: |
      #!/bin/bash
      set -euo pipefail
      DEST="$(workspaces.credentials.path)"

      export AWS_ACCESS_KEY_ID=$(grep aws_access_key_id "${DEST}/aws-creds" | cut -d= -f2 | tr -d ' ')
      export AWS_SECRET_ACCESS_KEY=$(grep aws_secret_access_key "${DEST}/aws-creds" | cut -d= -f2 | tr -d ' ')

      aws sts get-session-token --output json > "${DEST}/sts-creds.json"

      echo "STS credentials generated at ${DEST}/sts-creds.json"
