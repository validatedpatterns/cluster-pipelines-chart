apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: create-import-secret
  namespace: {{ .Values.pipelineNamespace }}
  labels:
    {{- include "pipelines.labels" . | nindent 4 }}
spec:
  description: Creates auto-import-secret for ACM from a kubeconfig workspace
  params:
  - name: cluster-name
    type: string
  workspaces:
  - name: kubeconfig
    description: Kubeconfig file at kubeconfig/kubeconfig
  steps:
  - name: create-import-secret
    image: {{ .Values.toolsImage | quote }}
    script: |
      #!/bin/bash
      set -euo pipefail
      NS="$(params.cluster-name)"
      KCFG="/workspace/kubeconfig/kubeconfig"
      if [[ ! -f "$KCFG" ]]; then
        echo "Kubeconfig not found at $KCFG" >&2
        exit 1
      fi
      oc create secret generic auto-import-secret \
        --namespace="$NS" \
        --from-file=kubeconfig="$KCFG" \
        --dry-run=client -o yaml | oc apply -f -
