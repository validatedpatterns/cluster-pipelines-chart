apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: create-externalsecrets
  namespace: {{ .Values.pipelineNamespace }}
  labels:
    {{- include "pipelines.labels" . | nindent 4 }}
spec:
  description: Creates ExternalSecret objects for cloud credentials and pull secret
  params:
  - name: cluster-name
    type: string
  - name: cloud-provider
    type: string
  - name: secret-store-name
    type: string
  - name: aws-creds-key-path
    type: string
  - name: gcp-creds-key-path
    type: string
  - name: azure-creds-key-path
    type: string
  - name: pullsecret-key-path
    type: string
  steps:
  - name: create-externalsecrets
    image: {{ .Values.toolsImage | quote }}
    script: |
      #!/bin/bash
      set -euo pipefail
      NS="$(params.cluster-name)"
      PROVIDER="$(echo "$(params.cloud-provider)" | tr '[:upper:]' '[:lower:]')"
      STORE="$(params.secret-store-name)"
      AWS_KEY="$(params.aws-creds-key-path)"
      GCP_KEY="$(params.gcp-creds-key-path)"
      AZURE_KEY="$(params.azure-creds-key-path)"
      PULL_KEY="$(params.pullsecret-key-path)"

      wait_for_secret() {
        local name="$1"
        local i
        for i in $(seq 1 60); do
          if oc get secret "$name" -n "$NS" &>/dev/null; then
            echo "Secret $name is ready in namespace $NS"
            return 0
          fi
          sleep 1
        done
        echo "Timed out waiting for secret $name in namespace $NS" >&2
        return 1
      }

      SECRETS_TO_WAIT=()

      case "$PROVIDER" in
        amazon|aws)
          cat <<EOF | oc apply -f -
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: eso-aws-creds
        namespace: ${NS}
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: ${STORE}
          kind: ClusterSecretStore
        target:
          name: aws-creds
          creationPolicy: Owner
        dataFrom:
        - extract:
            key: ${AWS_KEY}
      EOF
          SECRETS_TO_WAIT+=("aws-creds")
          ;;
        google|gcp)
          cat <<EOF | oc apply -f -
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: eso-gcp-creds
        namespace: ${NS}
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: ${STORE}
          kind: ClusterSecretStore
        target:
          name: gcp-creds
          creationPolicy: Owner
          template:
            engineVersion: v2
            mergePolicy: Replace
            data:
              osServiceAccount.json: '{{ "{{" }} .gcpjson | toString {{ "}}" }}'
        data:
        - secretKey: gcpjson
          remoteRef:
            key: ${GCP_KEY}
      EOF
          SECRETS_TO_WAIT+=("gcp-creds")
          ;;
        azure|microsoft)
          cat <<EOF | oc apply -f -
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: eso-azure-creds
        namespace: ${NS}
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: ${STORE}
          kind: ClusterSecretStore
        target:
          name: azure-creds
          creationPolicy: Owner
          template:
            engineVersion: v2
            mergePolicy: Replace
            data:
              osServicePrincipal.json: '{{ "{{" }} .azurejson | toString {{ "}}" }}'
        data:
        - secretKey: azurejson
          remoteRef:
            key: ${AZURE_KEY}
      EOF
          SECRETS_TO_WAIT+=("azure-creds")
          ;;
        *)
          echo "Unknown cloud-provider: $(params.cloud-provider); expected AWS/Amazon, GCP/Google, or Azure" >&2
          exit 1
          ;;
      esac

      cat <<EOF | oc apply -f -
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: global-pullsecret
        namespace: ${NS}
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: ${STORE}
          kind: ClusterSecretStore
        target:
          name: global-pullsecret
          creationPolicy: Owner
          template:
            type: kubernetes.io/dockerconfigjson
            engineVersion: v2
            mergePolicy: Replace
            data:
              .dockerconfigjson: '{{ "{{" }} .docker | toString {{ "}}" }}'
        data:
        - secretKey: docker
          remoteRef:
            key: ${PULL_KEY}
            property: docker
      EOF
      SECRETS_TO_WAIT+=("global-pullsecret")

      for s in "${SECRETS_TO_WAIT[@]}"; do
        wait_for_secret "$s"
      done
