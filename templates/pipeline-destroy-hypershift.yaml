apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: destroy-hypershift-cluster
  namespace: {{ .Values.pipelineNamespace }}
  labels:
    {{- include "pipelines.labels" . | nindent 4 }}
spec:
  description: Pipeline to destroy a HyperShift hosted cluster
  params:
  - name: cluster-name
    description: Name of the cluster to destroy
    type: string
  - name: cloud-region
    description: AWS region where the cluster was created
    type: string
  - name: role-arn
    description: AWS IAM role ARN for HyperShift
    type: string
  - name: timeout-minutes
    description: Timeout in minutes for resource deletion
    type: string
    default: "30"
  - name: secret-store-name
    type: string
    default: "vault-backend"
  - name: aws-creds-key-path
    type: string
    default: "secret/data/hub/aws"
  - name: pullsecret-key-path
    type: string
    default: "pushsecrets/global-pull-secret"
  - name: cluster-data-namespace
    description: Hub namespace expected gone before stripping HC finalizers; empty => cluster-<cluster-name>
    type: string
    default: ""
  workspaces:
  - name: credentials
    description: Writable workspace for STS creds
  tasks:
  - name: create-namespace
    taskRef:
      name: create-namespace
    params:
    - name: cluster-name
      value: $(params.cluster-name)

  - name: create-externalsecrets
    runAfter:
    - create-namespace
    taskRef:
      name: create-externalsecrets
    params:
    - name: cluster-name
      value: $(params.cluster-name)
    - name: cloud-provider
      value: aws
    - name: secret-store-name
      value: $(params.secret-store-name)
    - name: aws-creds-key-path
      value: $(params.aws-creds-key-path)
    - name: gcp-creds-key-path
      value: ""
    - name: azure-creds-key-path
      value: ""
    - name: pullsecret-key-path
      value: $(params.pullsecret-key-path)

  - name: prepare-credentials
    runAfter:
    - create-externalsecrets
    taskRef:
      name: hypershift-prepare-credentials
    params:
    - name: cluster-name
      value: $(params.cluster-name)
    workspaces:
    - name: credentials
      workspace: credentials

  - name: destroy-hosted-cluster
    runAfter:
    - prepare-credentials
    taskSpec:
      params:
      - name: cluster-name
        type: string
      - name: cloud-region
        type: string
      - name: role-arn
        type: string
      workspaces:
      - name: credentials
      steps:
      - name: destroy
        image: {{ .Values.hcpImage }}
        script: |
          #!/bin/bash
          set -euo pipefail

          CLUSTER_NAME=$(params.cluster-name)
          REGION=$(params.cloud-region)
          ROLE_ARN=$(params.role-arn)
          STS_CREDS="$(workspaces.credentials.path)/sts-creds.json"

          if ! oc get hostedcluster "${CLUSTER_NAME}" -n clusters &>/dev/null; then
            echo "HostedCluster ${CLUSTER_NAME} not found, nothing to destroy"
            exit 0
          fi

          echo "Destroying HyperShift cluster: ${CLUSTER_NAME}"

          hcp destroy cluster aws \
            --name "${CLUSTER_NAME}" \
            --infra-id "${CLUSTER_NAME}" \
            --region "${REGION}" \
            --role-arn "${ROLE_ARN}" \
            --sts-creds "${STS_CREDS}" || true

          echo "hcp destroy command completed"
    params:
    - name: cluster-name
      value: $(params.cluster-name)
    - name: cloud-region
      value: $(params.cloud-region)
    - name: role-arn
      value: $(params.role-arn)
    workspaces:
    - name: credentials
      workspace: credentials

  - name: delete-managed-cluster
    runAfter:
    - destroy-hosted-cluster
    taskSpec:
      params:
      - name: cluster-name
        type: string
      - name: timeout-minutes
        type: string
      steps:
      - name: delete
        image: {{ .Values.toolsImage }}
        script: |
          #!/bin/bash
          set -euo pipefail

          ENABLE_KAC='{{ include "pipelines.klusterletAddonEnabled" . | trim }}'
          CLUSTER_NAME=$(params.cluster-name)
          TIMEOUT=$(params.timeout-minutes)

          echo "Deleting ManagedCluster ${CLUSTER_NAME}..."
          oc delete managedcluster "${CLUSTER_NAME}" \
            --ignore-not-found \
            --wait=true \
            --timeout="${TIMEOUT}m" || true

          if [ "${ENABLE_KAC}" = "true" ]; then
            echo "Deleting KlusterletAddonConfig..."
            oc delete klusterletaddonconfig "${CLUSTER_NAME}" \
              -n "${CLUSTER_NAME}" \
              --ignore-not-found || true
          fi

          echo "Cleanup complete"
    params:
    - name: cluster-name
      value: $(params.cluster-name)
    - name: timeout-minutes
      value: $(params.timeout-minutes)

  - name: clear-hostedcluster-finalizers
    runAfter:
    - delete-managed-cluster
    taskRef:
      name: hypershift-clear-hostedcluster-finalizers
    params:
    - name: cluster-name
      value: $(params.cluster-name)
    - name: hosted-cluster-namespace
      value: {{ .Values.hypershift.hostedClusterNamespace | quote }}
    - name: cluster-data-namespace
      value: $(params.cluster-data-namespace)
